<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  
  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="2" fill="#fff"/>
    <circle cx="200" cy="100" r="2" fill="#fff"/>
    <circle cx="300" cy="100" r="2" fill="#fff"/>
    <circle cx="400" cy="100" r="2" fill="#fff"/>
    <circle cx="500" cy="100" r="2" fill="#fff"/>
    <circle cx="600" cy="100" r="2" fill="#fff"/>
    <circle cx="700" cy="100" r="2" fill="#fff"/>
    <circle cx="800" cy="100" r="2" fill="#fff"/>
    <circle cx="900" cy="100" r="2" fill="#fff"/>
    <circle cx="1000" cy="100" r="2" fill="#fff"/>
    <circle cx="1100" cy="100" r="2" fill="#fff"/>
    <circle cx="100" cy="200" r="2" fill="#fff"/>
    <circle cx="200" cy="200" r="2" fill="#fff"/>
    <circle cx="300" cy="200" r="2" fill="#fff"/>
    <circle cx="400" cy="200" r="2" fill="#fff"/>
    <circle cx="500" cy="200" r="2" fill="#fff"/>
    <circle cx="600" cy="200" r="2" fill="#fff"/>
    <circle cx="700" cy="200" r="2" fill="#fff"/>
    <circle cx="800" cy="200" r="2" fill="#fff"/>
    <circle cx="900" cy="200" r="2" fill="#fff"/>
    <circle cx="1000" cy="200" r="2" fill="#fff"/>
    <circle cx="1100" cy="200" r="2" fill="#fff"/>
    <circle cx="100" cy="300" r="2" fill="#fff"/>
    <circle cx="200" cy="300" r="2" fill="#fff"/>
    <circle cx="300" cy="300" r="2" fill="#fff"/>
    <circle cx="400" cy="300" r="2" fill="#fff"/>
    <circle cx="500" cy="300" r="2" fill="#fff"/>
    <circle cx="600" cy="300" r="2" fill="#fff"/>
    <circle cx="700" cy="300" r="2" fill="#fff"/>
    <circle cx="800" cy="300" r="2" fill="#fff"/>
    <circle cx="900" cy="300" r="2" fill="#fff"/>
    <circle cx="1000" cy="300" r="2" fill="#fff"/>
    <circle cx="1100" cy="300" r="2" fill="#fff"/>
    <circle cx="100" cy="400" r="2" fill="#fff"/>
    <circle cx="200" cy="400" r="2" fill="#fff"/>
    <circle cx="300" cy="400" r="2" fill="#fff"/>
    <circle cx="400" cy="400" r="2" fill="#fff"/>
    <circle cx="500" cy="400" r="2" fill="#fff"/>
    <circle cx="600" cy="400" r="2" fill="#fff"/>
    <circle cx="700" cy="400" r="2" fill="#fff"/>
    <circle cx="800" cy="400" r="2" fill="#fff"/>
    <circle cx="900" cy="400" r="2" fill="#fff"/>
    <circle cx="1000" cy="400" r="2" fill="#fff"/>
    <circle cx="1100" cy="400" r="2" fill="#fff"/>
    <circle cx="100" cy="500" r="2" fill="#fff"/>
    <circle cx="200" cy="500" r="2" fill="#fff"/>
    <circle cx="300" cy="500" r="2" fill="#fff"/>
    <circle cx="400" cy="500" r="2" fill="#fff"/>
    <circle cx="500" cy="500" r="2" fill="#fff"/>
    <circle cx="600" cy="500" r="2" fill="#fff"/>
    <circle cx="700" cy="500" r="2" fill="#fff"/>
    <circle cx="800" cy="500" r="2" fill="#fff"/>
    <circle cx="900" cy="500" r="2" fill="#fff"/>
    <circle cx="1000" cy="500" r="2" fill="#fff"/>
    <circle cx="1100" cy="500" r="2" fill="#fff"/>
  </g>

  <!-- Backpack icon (simplified) -->
  <g transform="translate(180, 140)">
    <!-- Backpack body -->
    <rect x="40" y="60" width="120" height="150" rx="20" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- Backpack top -->
    <path d="M70 60 Q100 20 130 60" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- Shoulder straps -->
    <path d="M75 60 L75 100 Q75 120 85 130" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
    <path d="M125 60 L125 100 Q125 120 115 130" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
    <!-- Pocket -->
    <rect x="65" y="140" width="70" height="40" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
    <!-- Laptop line -->
    <line x1="60" y1="100" x2="140" y2="100" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  </g>

  <!-- Small icons scattered: plane, wifi, globe, suitcase -->
  <g opacity="0.15" stroke="#38bdf8" fill="none" stroke-width="2">
    <path d="M950 120 L970 100 L990 120 L970 115 Z" />
    <path d="M1020 400 Q1030 380 1040 400" />
    <path d="M1015 410 Q1030 395 1045 410" />
    <path d="M1010 420 Q1030 405 1050 420" />
    <circle cx="200" cy="480" r="20" />
    <ellipse cx="200" cy="480" rx="35" ry="12" />
    <line x1="200" y1="460" x2="200" y2="500" />
    <line x1="175" y1="480" x2="225" y2="480" />
  </g>

  <!-- Main title -->
  <text x="600" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#38bdf8" text-anchor="middle" letter-spacing="4">THE DIGITAL NOMAD PACKING LIST 2026</text>
  
  <text x="600" y="240" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle">47 Items I Actually Use</text>
  <text x="600" y="290" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle">After <tspan fill="#38bdf8">2 Years</tspan> of Travel</text>
  
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Real gear. Real weights. Real regrets.</text>

  <!-- Stats bar -->
  <g transform="translate(350, 390)">
    <rect x="0" y="0" width="500" height="60" rx="12" fill="#1e293b" opacity="0.8"/>
    <text x="100" y="38" font-family="system-ui, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="600">20+ Countries</text>
    <line x1="200" y1="12" x2="200" y2="48" stroke="#334155" stroke-width="1"/>
    <text x="310" y="38" font-family="system-ui, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="600">47 Items</text>
    <line x1="400" y1="12" x2="400" y2="48" stroke="#334155" stroke-width="1"/>
    <text x="450" y="38" font-family="system-ui, sans-serif" font-size="15" fill="#38bdf8" text-anchor="middle" font-weight="700">9.2 kg</text>
  </g>

  <!-- Bottom branding -->
  <text x="600" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569" text-anchor="middle">NEXUS REMOTE HUB</text>
  
  <!-- Decorative lines -->
  <line x1="400" y1="540" x2="800" y2="540" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
</svg>